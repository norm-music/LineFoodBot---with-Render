<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增餐廳與設定</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-light p-4">

    <div class="card shadow-sm p-4 mx-auto" style="max-width: 500px;">
        <h3 class="mb-4 text-center text-primary">餐廳收藏助手</h3>
        
        <form id="restaurantForm">
            <div class="mb-4 p-3 bg-warning bg-opacity-10 border border-warning rounded">
                <label class="form-label fw-bold text-warning-emphasis">🎯 我的預設搜尋範圍</label>
                <select class="form-select" id="search_radius">
                    <option value="1.0">1 公里（附近走走）</option>
                    <option value="3.0">3 公里（騎車很近）</option>
                    <option value="5.0" selected>5 公里（開車或外送）</option>
                    <option value="10.0">10 公里（美食值得跑遠）</option>
                </select>
            </div>

            <hr>
            <h5 class="mb-3 text-secondary">新增收藏餐廳</h5>
            
            <div class="mb-3">
                <label class="form-label">餐廳名稱</label>
                <input type="text" class="form-control" id="name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">地址</label>
                <input type="text" class="form-control" id="address" required>
            </div>
            <div class="mb-3">
                <label class="form-label">種類</label>
                <input type="text" class="form-control" id="category" required>
            </div>
            <div class="mb-3">
                <label class="form-label">價格區間</label>
                <select class="form-select" id="price_range">
                    <option value="$">$</option>
                    <option value="$$">$$</option>
                    <option value="$$$">$$$</option>
                </select>
            </div>
            <div class="row">
                <div class="col mb-3">
                    <label class="form-label">緯度</label>
                    <input type="number" step="any" class="form-control" id="latitude" required>
                </div>
                <div class="col mb-3">
                    <label class="form-label">經度</label>
                    <input type="number" step="any" class="form-control" id="longitude" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mt-3">確認送出</button>
        </form>
    </div>

    <script>
        let userId = "";

        // 初始化 LIFF 并取得 User ID
        liff.init({ liffId: '2010226173-gsT146Rp' })
            .then(() => {
                if (liff.isLoggedIn()) {
                    const context = liff.getContext();
                    userId = context.userId; // 成功拿到使用者的 LINE ID
                } else {
                    liff.login(); // 如果沒登入則引導登入
                }
            })
            .catch((err) => { console.error(err); });

        document.getElementById('restaurantForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const data = {
                user_id: userId, // 將 User ID 傳給後端
                search_radius: parseFloat(document.getElementById('search_radius').value), // 範圍
                name: document.getElementById('name').value,
                address: document.getElementById('address').value,
                category: document.getElementById('category').value,
                price_range: document.getElementById('price_range').value,
                latitude: parseFloat(document.getElementById('latitude').value),
                longitude: parseFloat(document.getElementById('longitude').value)
            };

            fetch('/add_restaurant', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(res => {
                if(res.status === 'success') {
                    alert('設定與餐廳更新成功！');
                    liff.closeWindow(); 
                } else {
                    alert('更新失敗。');
                }
            })
            .catch(err => { alert('連線錯誤！'); });
        });
    </script>
</body>
</html>
