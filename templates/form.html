<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增收藏餐廳</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-light p-4">

    <div class="card shadow-sm p-4 mx-auto" style="max-width: 500px;">
        <h3 class="mb-4 text-center text-primary">新增收藏餐廳</h3>
        
        <form id="restaurantForm">
            <div class="mb-3">
                <label class="form-label">餐廳名稱</label>
                <input type="text" class="form-control" id="name" required placeholder="例如：巷口牛肉麵">
            </div>
            <div class="mb-3">
                <label class="form-label">地址</label>
                <input type="text" class="form-control" id="address" required placeholder="例如：台北市信義區...">
            </div>
            <div class="mb-3">
                <label class="form-label">種類</label>
                <input type="text" class="form-control" id="category" required placeholder="例如：小吃、日式、美式">
            </div>
            <div class="mb-3">
                <label class="form-label">價格區間</label>
                <select class="form-select" id="price_range">
                    <option value="$">$ (平價)</option>
                    <option value="$$">$$ (中價位)</option>
                    <option value="$$$">$$$ (高價位)</option>
                </select>
            </div>
            <div class="row">
                <div class="col mb-3">
                    <label class="form-label">緯度 (Latitude)</label>
                    <input type="number" step="any" class="form-control" id="latitude" required placeholder="25.033">
                </div>
                <div class="col mb-3">
                    <label class="form-label">經度 (Longitude)</label>
                    <input type="number" step="any" class="form-control" id="longitude" required placeholder="121.564">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mt-3">確認新增</button>
        </form>
    </div>

    <script>
        // 初始化 LIFF
        // 請將 '你的LIFF_ID' 換成從 LINE Developers 取得的 LIFF ID (網址中 liff.me/ 後面那一串)
        liff.init({ liffId: 2010226173-gsT146Rp })
            .then(() => {
                console.log("LIFF 初始化成功");
            })
            .catch((err) => {
                console.error("LIFF 初始化失敗", err);
            });

        // 監聽表單送出事件
        document.getElementById('restaurantForm').addEventListener('submit', function(e) {
            e.preventDefault(); // 阻止網頁原生跳轉

            // 整理表單資料
            const data = {
                name: document.getElementById('name').value,
                address: document.getElementById('address').value,
                category: document.getElementById('category').value,
                price_range: document.getElementById('price_range').value,
                latitude: parseFloat(document.getElementById('latitude').value),
                longitude: parseFloat(document.getElementById('longitude').value)
            };

            // 使用 fetch 將資料以 JSON 格式發送到 Flask 後端
            fetch('/add_restaurant', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(res => {
                if(res.status === 'success') {
                    alert('餐廳新增成功！');
                    // 關閉 LIFF 視窗，回到 LINE 聊天室
                    liff.closeWindow(); 
                } else {
                    alert('新增失敗，請重試。');
                }
            })
            .catch(err => {
                alert('連線錯誤！');
                console.error(err);
            });
        });
    </script>
</body>
</html>
