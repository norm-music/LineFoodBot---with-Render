<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增餐廳與設定</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <style>
        body {
            background: linear-gradient(135deg, #fdfbf7 0%, #f5f0e6 100%);
            min-height: 100vh;
            font-family: "Helvetica Neue", Arial, "微軟正黑體", sans-serif;
        }
        .main-card {
            max-width: 480px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(139, 94, 60, 0.1) !important;
            background-color: #ffffff;
        }
        .brand-title {
            color: #d97706;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .setting-section {
            background-color: #fef3c7;
            border: 1px solid #fde68a;
            border-radius: 12px;
        }
        .form-label {
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 0.4rem;
        }
        .form-control, .form-select {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 0.6rem 0.8rem;
            transition: all 0.2s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
        }
        .btn-submit {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            border: none;
            border-radius: 10px;
            padding: 0.75rem;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.2);
            transition: all 0.2s ease;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(217, 119, 6, 0.3);
        }
        .section-divider {
            border-top: 2px dashed #f3f4f6;
            margin: 2rem 0;
        }
    </style>
</head>
<body class="p-3 p-md-4">

    <div class="card main-card p-4 mx-auto mt-3">
        <h3 class="mb-4 text-center brand-title">🍳 餐廳收藏助手</h3>
        
        <form id="restaurantForm">
            <div class="mb-4 p-3 setting-section">
                <label class="form-label text-amber-900">🎯 我的預設搜尋範圍</label>
                <select class="form-select" id="search_radius">
                    <option value="1.0">1 公里（附近走走）</option>
                    <option value="3.0">3 公里（騎車很近）</option>
                    <option value="5.0" selected>5 公里（開車或外送）</option>
                    <option value="10.0">10 公里（美食值得跑遠）</option>
                </select>
            </div>

            <div class="section-divider"></div>
            
            <h5 class="mb-3 text-secondary fw-bold">✨ 新增收藏餐廳</h5>
            
            <div class="mb-3">
                <label class="form-label">餐廳名稱</label>
                <input type="text" class="form-control" id="name" placeholder="例如：阿裕牛肉湯" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">詳細地址</label>
                <input type="text" class="form-control" id="address" placeholder="請輸入完整地址以利定位" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">料理種類</label>
                <input type="text" class="form-control" id="category" placeholder="例如：火鍋、小吃、美式" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label">價格區間</label>
                <select class="form-select" id="price_range">
                    <option value="$">$ (平價小吃)</option>
                    <option value="$$">$$ (中價簡餐)</option>
                    <option value="$$$">$$$ (高價餐廳)</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 btn-submit">確認送出更新</button>
        </form>
    </div>

    <script>
        let userId = "";

        // 初始化 LIFF
        liff.init({ liffId: '2010226173-gsT146Rp' })
            .then(() => {
                if (liff.isLoggedIn()) {
                    const context = liff.getContext();
                    userId = context.userId; 
                } else {
                    liff.login(); 
                }
            })
            .catch((err) => { console.error("LIFF 初始化失敗:", err); });

        // 表單送出事件
        document.getElementById('restaurantForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const data = {
                user_id: userId,
                search_radius: parseFloat(document.getElementById('search_radius').value),
                name: document.getElementById('name').value,
                address: document.getElementById('address').value,
                category: document.getElementById('category').value,
                price_range: document.getElementById('price_range').value
                // 這裡也不需要再傳送經緯度給後端了
            };

            fetch('/add_restaurant', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(res => {
                if(res.status === 'success') {
                    alert('設定與餐廳更新成功！');
                    liff.closeWindow(); 
                } else {
                    // 顯示後端傳回來的錯誤訊息（例如地址查不到經緯度）
                    alert('更新失敗：' + res.message);
                }
            })
            .catch(err => { alert('連線錯誤，請稍後再試！'); });
        });
    </script>
</body>
</html>
